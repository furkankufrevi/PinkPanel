pre-commit:
  parallel: true
  commands:
    go-fmt:
      glob: "*.go"
      run: gofmt -l -w {staged_files}
      stage_fixed: true
    go-lint:
      glob: "*.go"
      run: golangci-lint run --fix
      stage_fixed: true
    frontend-lint:
      glob: "web/src/**/*.{ts,tsx}"
      run: cd web && npx eslint --fix {staged_files}
      stage_fixed: true
    frontend-fmt:
      glob: "web/src/**/*.{ts,tsx,css}"
      run: cd web && npx prettier --write {staged_files}
      stage_fixed: true
